<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acorn Notes — Sign up</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #1f2937; background: #f5f7fb; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; }
    main { width: min(430px, calc(100vw - 40px)); background: white; padding: 34px; border-radius: 18px; box-shadow: 0 18px 60px rgba(31,41,55,.12); }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { color: #64748b; line-height: 1.5; }
    label { display: block; font-weight: 650; margin-top: 20px; }
    input { box-sizing: border-box; width: 100%; margin-top: 8px; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 10px; font: inherit; }
    button { width: 100%; margin-top: 24px; padding: 13px; border: 0; border-radius: 10px; background: #3157d5; color: white; font: inherit; font-weight: 750; cursor: pointer; }
    .message { margin-top: 18px; padding: 12px; border-radius: 10px; display: none; }
    .error { display: block; color: #991b1b; background: #fee2e2; border: 1px solid #fecaca; }
  </style>
</head>
<body>
  <main>
    <h1>Create your account</h1>
    <p>Start organizing your notes in one calm, searchable place.</p>
    <form id="signup">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" minlength="8" required />
      <button type="submit">Create account</button>
      <div id="message" class="message" role="alert"></div>
    </form>
  </main>
  <script>
    document.querySelector('#signup').addEventListener('submit', (event) => {
      event.preventDefault();
      const message = document.querySelector('#message');
      // Seeded regression for the demo: valid submissions are incorrectly sent down the failure path.
      message.className = 'message error';
      message.textContent = 'Unable to create account. Please try again later.';
    });
  </script>
</body>
</html>
